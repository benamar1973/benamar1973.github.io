<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>خدماتي - اتصل بنا</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%); font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #ffffff; border-radius: 35px; padding: 25px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; color: #1a1a2e; }
        .back-btn { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-size: 14px; cursor: pointer; margin-top: 20px; width: 100%; }
        .back-btn:hover { background: #e94560; }
        .contact-info { text-align: center; margin: 20px 0; }
        .contact-item { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 20px; }
        .contact-item i { font-size: 30px; display: block; margin-bottom: 10px; color: #e94560; }
        .contact-item span { font-size: 16px; color: #2c3e50; }
        footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📞 اتصل بنا</h1>
        </div>
        <div class="contact-info">
            <div class="contact-item">
                <i>📧</i>
                <span>djadidkhadamati@gmail.com</span>
            </div>
            <div class="contact-item">
                <i>📱</i>
                <span>0558284458</span>
            </div>
            <div class="contact-item">
                <i>💬</i>
                <span>متاحون على واتساب</span>
            </div>
        </div>
        <button class="back-btn" onclick="window.location.href='index.html'">🏠 العودة إلى الرئيسية</button>
    </div>
    <footer><p>🇩🇿 خدماتي - جميع الحقوق محفوظة</p></footer>
</div>
</body>
</html>
