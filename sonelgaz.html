<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>خدماتي - دفع فاتورة سونلغاز</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 26px;
        }
        .balance-box {
            background: #e9ecef;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance {
            font-size: 32px;
            font-weight: bold;
            color: #0f3460;
            margin: 10px 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #0f3460;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #1e7e34;
        }
        .recharge-btn {
            background: #007bff;
            margin-bottom: 15px;
        }
        .recharge-btn:hover {
            background: #0056b3;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 15px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        /* تنسيق الإيصال المخفي */
        #receipt-content {
            display: none;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            background: white;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚡ دفع فاتورة سونلغاز</h1>
            
            <div class="balance-box">
                <span>💰 رصيد المحفظة</span>
                <div class="balance" id="balanceDisplay">0 دج</div>
                <button class="recharge-btn" id="rechargeBtn">➕ شحن المحفظة (تجريبي)</button>
            </div>

            <div class="input-group">
                <label>📄 رقم العميل</label>
                <input type="text" id="clientNumber" placeholder="أدخل رقم العميل">
            </div>
            <div class="input-group">
                <label>📑 رقم الفاتورة</label>
                <input type="text" id="invoiceNumber" placeholder="أدخل رقم الفاتورة">
            </div>
            <div class="input-group">
                <label>🔢 رقم EBB</label>
                <input type="text" id="ebbNumber" placeholder="أدخل رقم EBB">
            </div>
            <div class="input-group">
                <label>💵 المبلغ (دج)</label>
                <input type="number" id="amount" placeholder="المبلغ المطلوب دفعه">
            </div>

            <button id="payBtn">💳 دفع الفاتورة</button>
            <div id="message" class="message"></div>
        </div>
        <footer>
            <p>خدماتي - دفع فواتير الكهرباء والغاز</p>
        </footer>
    </div>

    <!-- قالب الإيصال المخفي -->
    <div id="receipt-content">
        <div style="text-align: center;">
            <h2>📄 إيصال دفع سونلغاز</h2>
            <hr>
            <p><strong>📅 التاريخ:</strong> <span id="receipt-date"></span></p>
            <p><strong>🔢 رقم العملية:</strong> <span id="receipt-transaction-id"></span></p>
            <p><strong>👤 رقم العميل:</strong> <span id="receipt-client-number"></span></p>
            <p><strong>📑 رقم الفاتورة:</strong> <span id="receipt-invoice-number"></span></p>
            <p><strong>🔢 رقم EBB:</strong> <span id="receipt-ebb-number"></span></p>
            <p><strong>💰 المبلغ المدفوع:</strong> <span id="receipt-amount"></span> دج</p>
            <p><strong>✅ الحالة:</strong> مدفوع</p>
            <hr>
            <p style="font-size: 12px;">شكراً لاستخدامك خدماتي</p>
        </div>
    </div>

    <script>
        // === إدارة الرصيد في localStorage ===
        let currentBalance = localStorage.getItem('walletBalance') ? parseInt(localStorage.getItem('walletBalance')) : 500;

        function updateBalanceDisplay() {
            document.getElementById('balanceDisplay').innerText = currentBalance + ' دج';
            localStorage.setItem('walletBalance', currentBalance);
        }

        // شحن المحفظة (تجريبي)
        document.getElementById('rechargeBtn').addEventListener('click', () => {
            let amount = prompt('أدخل المبلغ الذي تريد شحنه (دج):', '500');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                currentBalance += parseInt(amount);
                updateBalanceDisplay();
                showMessage('success', '✅ تم شحن المحفظة بنجاح! رصيدك الحالي: ' + currentBalance + ' دج');
            } else {
                showMessage('error', '❌ مبلغ غير صحيح');
            }
        });

        function showMessage(type, text) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.innerText = text;
            setTimeout(() => {
                msgDiv.className = 'message';
                msgDiv.innerText = '';
            }, 4000);
        }

        // دالة إنشاء وتحميل PDF
        function downloadReceiptPDF(data) {
            document.getElementById('receipt-date').innerText = data.date;
            document.getElementById('receipt-transaction-id').innerText = data.transactionId;
            document.getElementById('receipt-client-number').innerText = data.clientNumber;
            document.getElementById('receipt-invoice-number').innerText = data.invoiceNumber;
            document.getElementById('receipt-ebb-number').innerText = data.ebbNumber;
            document.getElementById('receipt-amount').innerText = data.amount;

            const element = document.getElementById('receipt-content');
            element.style.display = 'block';
            
            const opt = {
                margin: 0.5,
                filename: `receipt_sonelgaz_${data.transactionId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 1000);
        }

        // دفع الفاتورة
        document.getElementById('payBtn').addEventListener('click', () => {
            const clientNumber = document.getElementById('clientNumber').value.trim();
            const invoiceNumber = document.getElementById('invoiceNumber').value.trim();
            const ebbNumber = document.getElementById('ebbNumber').value.trim();
            const amount = parseInt(document.getElementById('amount').value);

            // التحقق من صحة الحقول
            if (!clientNumber || !invoiceNumber || !ebbNumber || !amount || amount <= 0) {
                showMessage('error', '❌ الرجاء ملء جميع الحقول بشكل صحيح');
                return;
            }

            if (amount > currentBalance) {
                showMessage('error', `❌ رصيدك غير كافٍ! رصيدك الحالي: ${currentBalance} دج`);
                return;
            }

            // خصم المبلغ
            currentBalance -= amount;
            updateBalanceDisplay();

            // إنشاء رقم عملية عشوائي
            const transactionId = 'SNG-' + Date.now() + '-' + Math.floor(Math.random() * 10000);

            // إعداد بيانات الإيصال
            const receiptData = {
                date: new Date().toLocaleString('ar-EG'),
                transactionId: transactionId,
                clientNumber: clientNumber,
                invoiceNumber: invoiceNumber,
                ebbNumber: ebbNumber,
                amount: amount
            };

            // تحميل PDF
            downloadReceiptPDF(receiptData);

            // رسالة نجاح
            showMessage('success', '✅ تم دفع الفاتورة بنجاح! جاري تحميل الإيصال');

            // تفريغ الحقول (اختياري)
            document.getElementById('clientNumber').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('ebbNumber').value = '';
            document.getElementById('amount').value = '';
        });

        // عرض الرصيد عند تحميل الصفحة
        updateBalanceDisplay();
    </script>
</body>
  </html>
