<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سونلغاز - دفع الفاتورة (مع اسم الزبون)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .solde-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .solde-box { flex: 1; background: #f8fafd; border-radius: 24px; padding: 15px; text-align: center; }
        .solde-box .number { font-size: 28px; font-weight: bold; color: #1a2c3e; }
        .title { font-size: 20px; font-weight: bold; color: #1f7b4d; margin-bottom: 10px; }
        .scanner-btn { background: #0f3460; color: white; padding: 12px; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; margin: 15px 0; cursor: pointer; width: 100%; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 14px; }
        button { width: 100%; background: #1f7b4d; color: white; padding: 15px; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .recharge-btn { background: #2c5f8a; margin-top: 5px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2c3e; color: white; padding: 8px 16px; border-radius: 30px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 999; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        .qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="card">
    <div class="solde-row">
        <div class="solde-box"><h4>Solde</h4><div class="number" id="soldeDisplay">0 DZD</div></div>
        <div class="solde-box"><h4>Bonus</h4><div class="number">0 DZD</div></div>
    </div>
    <div class="title">⚡ Sonelgaz - Paiement Factures</div>
    
    <button id="scanBtn" class="scanner-btn">📷 Scanner le code (Data Matrix)</button>

    <label>👤 Nom Client *</label>
    <input type="text" id="nomClient" placeholder="Nom complet du client">

    <label>📘 Numéro Client *</label>
    <input type="text" id="client" placeholder="Entrez votre numéro client">

    <label>🧾 Numéro Facture *</label>
    <input type="text" id="facture" placeholder="Entrez le numéro de facture">

    <label>🔢 Numéro EBB *</label>
    <input type="text" id="ebb" placeholder="Entrez le numéro EBB">

    <label>💰 Montant *</label>
    <input type="number" id="montant" step="0.01" placeholder="Entrez le montant">

    <button id="payerBtn">💳 Payer maintenant</button>
    <button id="rechargeBtn" class="recharge-btn">➕ Recharger le portefeuille (test)</button>
    <button id="demoFillBtn" style="background:#6c757d; margin-top:5px;">📝 Remplir avec test</button>
</div>
<div id="toast" class="toast"></div>

<div id="receiptContent" style="display: none; direction: rtl; padding: 20px; font-family: sans-serif;">
    <div style="text-align: center;">
        <h2>📄 إيصال دفع فاتورة الكهرباء</h2><hr>
        <p><strong>📅 التاريخ:</strong> <span id="receiptDate"></span></p>
        <p><strong>🔢 رقم العملية:</strong> <span id="receiptId"></span></p>
        <p><strong>👤 اسم الزبون:</strong> <span id="receiptNom"></span></p>
        <p><strong>👤 رقم العميل:</strong> <span id="receiptClient"></span></p>
        <p><strong>🧾 رقم الفاتورة:</strong> <span id="receiptFacture"></span></p>
        <p><strong>🔢 رقم EBB:</strong> <span id="receiptEBB"></span></p>
        <p><strong>💰 المبلغ المدفوع:</strong> <span id="receiptMontant"></span> DZD</p>
        <p><strong>✅ الحالة:</strong> مدفوع</p><hr>
        <p>شكراً لاستخدامكم خدماتي</p>
    </div>
</div>

<script>
    let currentBalance = localStorage.getItem('walletBalance') ? parseFloat(localStorage.getItem('walletBalance')) : 500.00;
    function updateBalanceUI() {
        document.getElementById('soldeDisplay').innerText = currentBalance.toFixed(2) + ' DZD';
        localStorage.setItem('walletBalance', currentBalance);
    }
    updateBalanceUI();

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        toast.style.background = isError ? '#c53030' : '#1f7b4d';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    function fillFields(data) {
        if (data.nom) document.getElementById('nomClient').value = data.nom;
        if (data.client) document.getElementById('client').value = data.client;
        if (data.facture) document.getElementById('facture').value = data.facture;
        if (data.ebb) document.getElementById('ebb').value = data.ebb;
        if (data.montant) document.getElementById('montant').value = data.montant;
        showToast('✅ تم تعبئة الحقول من المسح', false);
    }

    // تفسير النص الممسوح (يحاول استخراج الاسم، الرقم، الفاتورة، EBB، المبلغ)
    function parseScannedText(text) {
        let parts = [];
        if (text.includes('|')) parts = text.split('|');
        else if (text.includes(' ')) parts = text.split(/\s+/);
        else parts = [text];
        parts = parts.filter(p => p.trim().length > 0);
        
        if (parts.length >= 5) {
            return { nom: parts[0].trim(), client: parts[1].trim(), facture: parts[2].trim(), ebb: parts[3].trim(), montant: parts[4].trim() };
        } else if (parts.length === 4) {
            return { nom: '', client: parts[0].trim(), facture: parts[1].trim(), ebb: parts[2].trim(), montant: parts[3].trim() };
        } else if (parts.length === 3) {
            return { nom: '', client: parts[0].trim(), facture: parts[1].trim(), ebb: parts[2].trim(), montant: '' };
        } else if (parts.length === 2) {
            return { nom: '', client: parts[0].trim(), facture: parts[1].trim(), ebb: '', montant: '' };
        } else {
            return { nom: '', client: parts[0].trim(), facture: '', ebb: '', montant: '' };
        }
    }

    const scanBtn = document.getElementById('scanBtn');
    scanBtn.addEventListener('click', () => {
        const overlay = document.createElement('div');
        overlay.className = 'qr-overlay';
        const readerDiv = document.createElement('div');
        readerDiv.id = 'reader';
        readerDiv.style.width = '90%';
        readerDiv.style.maxWidth = '400px';
        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'إغلاق';
        closeBtn.style.marginTop = '15px';
        closeBtn.style.padding = '10px';
        closeBtn.style.background = '#dc2626';
        closeBtn.style.color = 'white';
        closeBtn.style.border = 'none';
        closeBtn.style.borderRadius = '40px';
        closeBtn.style.cursor = 'pointer';
        
        overlay.appendChild(readerDiv);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
        
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            const parsed = parseScannedText(decodedText);
            fillFields(parsed);
            html5QrCode.stop();
            document.body.removeChild(overlay);
            showToast('تم المسح وتعبئة الحقول بنجاح', false);
        }).catch(err => {
            showToast('فشل في بدء الكاميرا: ' + err, true);
            document.body.removeChild(overlay);
        });
        
        closeBtn.addEventListener('click', () => {
            if (html5QrCode.isScanning) html5QrCode.stop();
            document.body.removeChild(overlay);
        });
    });

    document.getElementById('demoFillBtn').addEventListener('click', () => {
        document.getElementById('nomClient').value = 'محمد أحمد بن عمارة';
        document.getElementById('client').value = '0123456789';
        document.getElementById('facture').value = 'FACT-2026-123456';
        document.getElementById('ebb').value = 'EBB987654321';
        document.getElementById('montant').value = '1250.00';
        showToast('📝 تم ملء الحقول ببيانات تجريبية (بما فيها الاسم)', false);
    });

    function generatePDF(data) {
        document.getElementById('receiptDate').innerText = data.date;
        document.getElementById('receiptId').innerText = data.transactionId;
        document.getElementById('receiptNom').innerText = data.nom;
        document.getElementById('receiptClient').innerText = data.client;
        document.getElementById('receiptFacture').innerText = data.facture;
        document.getElementById('receiptEBB').innerText = data.ebb;
        document.getElementById('receiptMontant').innerText = data.montant;
        const element = document.getElementById('receiptContent');
        element.style.display = 'block';
        html2pdf().set({ margin: 0.5, filename: `facture_${data.transactionId}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
        setTimeout(() => element.style.display = 'none', 1000);
    }

    document.getElementById('rechargeBtn').addEventListener('click', () => {
        let amount = prompt('أدخل مبلغ الشحن (DZD):', '500');
        if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
            currentBalance += parseFloat(amount);
            updateBalanceUI();
            showToast('✅ تم شحن المحفظة بنجاح', false);
        } else showToast('❌ مبلغ غير صحيح', true);
    });

    document.getElementById('payerBtn').addEventListener('click', () => {
        const nomVal = document.getElementById('nomClient').value.trim();
        const clientVal = document.getElementById('client').value.trim();
        const factureVal = document.getElementById('facture').value.trim();
        const ebbVal = document.getElementById('ebb').value.trim();
        const montantVal = parseFloat(document.getElementById('montant').value);
        if (!nomVal || !clientVal || !factureVal || !ebbVal || isNaN(montantVal) || montantVal <= 0) {
            showToast('❌ الرجاء ملء جميع الحقول بشكل صحيح', true);
            return;
        }
        if (montantVal > currentBalance) {
            showToast(`❌ رصيدك غير كافٍ! رصيدك الحالي: ${currentBalance.toFixed(2)} DZD`, true);
            return;
        }
        currentBalance -= montantVal;
        updateBalanceUI();
        const transactionId = 'SNG-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        generatePDF({ date: new Date().toLocaleString('ar-EG'), transactionId, nom: nomVal, client: clientVal, facture: factureVal, ebb: ebbVal, montant: montantVal.toFixed(2) });
        showToast(`✅ تم دفع ${montantVal.toFixed(2)} DZD بنجاح! جاري تحميل الإيصال`, false);
    });
</script>
</body>
</html>
