<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سونلغاز - دفع الفاتورة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .solde-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .solde-box { flex: 1; background: #f8fafd; border-radius: 24px; padding: 15px; text-align: center; }
        .solde-box .number { font-size: 28px; font-weight: bold; color: #1a2c3e; }
        .title { font-size: 20px; font-weight: bold; color: #1f7b4d; margin-bottom: 10px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 14px; }
        button { width: 100%; background: #1f7b4d; color: white; padding: 15px; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .recharge-btn { background: #2c5f8a; margin-top: 5px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2c3e; color: white; padding: 8px 16px; border-radius: 30px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 999; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="card">
    <div class="solde-row">
        <div class="solde-box"><h4>Solde</h4><div class="number" id="soldeDisplay">0 DZD</div></div>
        <div class="solde-box"><h4>Bonus</h4><div class="number">0 DZD</div></div>
    </div>
    <div class="title">⚡ Sonelgaz - Paiement Factures</div>

    <label>📘 Numéro Client *</label>
    <input type="text" id="client" placeholder="Entrez votre numéro client">

    <label>🧾 Numéro Facture *</label>
    <input type="text" id="facture" placeholder="Entrez le numéro de facture">

    <label>🔢 Numéro EBB *</label>
    <input type="text" id="ebb" placeholder="Entrez le numéro EBB">

    <label>💰 Montant *</label>
    <input type="number" id="montant" step="0.01" placeholder="Entrez le montant">

    <button id="payerBtn">💳 Payer maintenant</button>
    <button id="rechargeBtn" class="recharge-btn">➕ Recharger le portefeuille (test)</button>
</div>
<div id="toast" class="toast"></div>

<div id="receiptContent" style="display: none; direction: rtl; padding: 20px; font-family: sans-serif;">
    <div style="text-align: center;">
        <h2>📄 إيصال دفع فاتورة الكهرباء</h2><hr>
        <p><strong>📅 التاريخ:</strong> <span id="receiptDate"></span></p>
        <p><strong>🔢 رقم العملية:</strong> <span id="receiptId"></span></p>
        <p><strong>👤 رقم العميل:</strong> <span id="receiptClient"></span></p>
        <p><strong>🧾 رقم الفاتورة:</strong> <span id="receiptFacture"></span></p>
        <p><strong>🔢 رقم EBB:</strong> <span id="receiptEBB"></span></p>
        <p><strong>💰 المبلغ المدفوع:</strong> <span id="receiptMontant"></span> DZD</p>
        <p><strong>✅ الحالة:</strong> مدفوع</p><hr>
        <p>شكراً لاستخدامكم خدماتي</p>
    </div>
</div>

<script>
    function autoFill() {
        document.getElementById('client').value = '0123456789';
        document.getElementById('facture').value = 'FACT-2026-123456';
        document.getElementById('ebb').value = 'EBB987654321';
        document.getElementById('montant').value = '1250.00';
        showToast('📝 تم ملء الحقول تلقائياً ببيانات تجريبية', false);
    }

    let currentBalance = localStorage.getItem('walletBalance') ? parseFloat(localStorage.getItem('walletBalance')) : 500.00;
    function updateBalanceUI() {
        document.getElementById('soldeDisplay').innerText = currentBalance.toFixed(2) + ' DZD';
        localStorage.setItem('walletBalance', currentBalance);
    }
    updateBalanceUI();

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        toast.style.background = isError ? '#c53030' : '#1f7b4d';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    function generatePDF(data) {
        document.getElementById('receiptDate').innerText = data.date;
        document.getElementById('receiptId').innerText = data.transactionId;
        document.getElementById('receiptClient').innerText = data.client;
        document.getElementById('receiptFacture').innerText = data.facture;
        document.getElementById('receiptEBB').innerText = data.ebb;
        document.getElementById('receiptMontant').innerText = data.montant;
        const element = document.getElementById('receiptContent');
        element.style.display = 'block';
        html2pdf().set({ margin: 0.5, filename: `facture_${data.transactionId}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
        setTimeout(() => element.style.display = 'none', 1000);
    }

    document.getElementById('rechargeBtn').addEventListener('click', () => {
        let amount = prompt('أدخل مبلغ الشحن (DZD):', '500');
        if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
            currentBalance += parseFloat(amount);
            updateBalanceUI();
            showToast('✅ تم شحن المحفظة بنجاح', false);
        } else showToast('❌ مبلغ غير صحيح', true);
    });

    document.getElementById('payerBtn').addEventListener('click', () => {
        const clientVal = document.getElementById('client').value.trim();
        const factureVal = document.getElementById('facture').value.trim();
        const ebbVal = document.getElementById('ebb').value.trim();
        const montantVal = parseFloat(document.getElementById('montant').value);
        if (!clientVal || !factureVal || !ebbVal || isNaN(montantVal) || montantVal <= 0) {
            showToast('❌ الرجاء ملء جميع الحقول بشكل صحيح', true);
            return;
        }
        if (montantVal > currentBalance) {
            showToast(`❌ رصيدك غير كافٍ! رصيدك الحالي: ${currentBalance.toFixed(2)} DZD`, true);
            return;
        }
        currentBalance -= montantVal;
        updateBalanceUI();
        const transactionId = 'SNG-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        generatePDF({ date: new Date().toLocaleString('ar-EG'), transactionId, client: clientVal, facture: factureVal, ebb: ebbVal, montant: montantVal.toFixed(2) });
        showToast(`✅ تم دفع ${montantVal.toFixed(2)} DZD بنجاح! جاري تحميل الإيصال`, false);
    });

    window.addEventListener('load', autoFill);
</script>
</body>
</html>
