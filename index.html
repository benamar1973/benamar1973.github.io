<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>خدماتي - المحفظة الإلكترونية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .main-card {
            background: #ffffff;
            border-radius: 35px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .auth-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 25px;
        }

        .auth-section input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
        }

        .auth-section button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login {
            background: #0f3460;
            color: white;
        }

        .btn-signup {
            background: #e94560;
            color: white;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
        }

        .wallet-section {
            text-align: center;
            padding: 15px;
            background: #e9ecef;
            border-radius: 25px;
            margin-bottom: 20px;
        }

        .balance {
            font-size: 32px;
            font-weight: bold;
            color: #0f3460;
            margin: 10px 0;
        }

        .btn-action {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .service-btn {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e9ecef;
        }

        .service-btn:active {
            transform: scale(0.96);
        }

        .status {
            text-align: center;
            margin-top: 10px;
            color: #e94560;
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="header">
                <h1>📱 خدماتي - المحفظة الإلكترونية</h1>
            </div>

            <!-- قسم تسجيل الدخول / إنشاء حساب -->
            <div id="authSection" class="auth-section">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="password" placeholder="كلمة المرور">
                <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور (للحساب الجديد)">
                <button id="loginBtn" class="btn-login">تسجيل الدخول</button>
                <button id="signupBtn" class="btn-signup">إنشاء حساب جديد</button>
                <div id="authStatus" class="status"></div>
            </div>

            <!-- قسم المحفظة (يظهر فقط بعد تسجيل الدخول) -->
            <div id="walletSection" style="display: none;">
                <div class="wallet-section">
                    <h3>💰 رصيد المحفظة</h3>
                    <div id="balance" class="balance">0 دج</div>
                    <button id="rechargeBtn" class="btn-action">شحن المحفظة</button>
                    <button id="payBillBtn" class="btn-action">دفع فاتورة</button>
                    <button id="logoutBtn" class="btn-action btn-logout">تسجيل الخروج</button>
                </div>

                <div class="services-grid">
                    <div class="service-btn" onclick="alert('🔜 سيتم تفعيل دفع فاتورة الكهرباء قريباً')">💡 كهرباء</div>
                    <div class="service-btn" onclick="alert('🔜 سيتم تفعيل دفع فاتورة الماء قريباً')">💧 ماء</div>
                    <div class="service-btn" onclick="alert('🔜 سيتم تفعيل دفع فاتورة الإنترنت قريباً')">📡 إنترنت</div>
                    <div class="service-btn" onclick="alert('🔜 سيتم تفعيل دفع فاتورة الهاتف قريباً')">📱 هاتف</div>
                </div>
            </div>

            <footer>
                <p>🇩🇿 خدماتي - أول محفظة إلكترونية جزائرية للتسديد</p>
                <p><a href="mailto:mustaphabenamar40@example.com">📧 mustaphabenamar40@example.com</a></p>
            </footer>
        </div>
    </div>

    <!-- استيراد Firebase SDK (موديول) -->
    <script type="module">
        // 🔥 Firebase Configuration (تم نسخه من مشروعك)
        const firebaseConfig = {
            apiKey: "AIzaSyBie4Rtm0_d5fVhKDU30XZ_-BQnMtqCGDw",
            authDomain: "khadamati-dz-28051.firebaseapp.com",
            projectId: "khadamati-dz-28051",
            storageBucket: "khadamati-dz-28051.firebasestorage.app",
            messagingSenderId: "689071750342",
            appId: "1:689071750342:web:9fc6a708d681736d5dabc7"
        };

        // استيراد دوال Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر HTML
        const authSection = document.getElementById('authSection');
        const walletSection = document.getElementById('walletSection');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const balanceDiv = document.getElementById('balance');
        const authStatus = document.getElementById('authStatus');

        // تحديث واجهة المستخدم عند تغير حالة تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // المستخدم مسجل دخول
                authSection.style.display = 'none';
                walletSection.style.display = 'block';
                
                // جلب رصيد المحفظة من Firestore
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const balance = userSnap.data().balance || 0;
                    balanceDiv.innerText = balance + " دج";
                } else {
                    // إنشاء محفظة جديدة للمستخدم الجديد (لأول مرة)
                    await setDoc(userRef, { balance: 0, email: user.email });
                    balanceDiv.innerText = "0 دج";
                }
                authStatus.innerText = "";
            } else {
                // غير مسجل دخول
                authSection.style.display = 'block';
                walletSection.style.display = 'none';
                emailInput.value = '';
                passwordInput.value = '';
                confirmPasswordInput.value = '';
                authStatus.innerText = "";
            }
        });

        // تسجيل الدخول
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) {
                authStatus.innerText = "الرجاء إدخال البريد الإلكتروني وكلمة المرور";
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                authStatus.innerText = "✅ تم تسجيل الدخول بنجاح";
            } catch (error) {
                let msg = "❌ خطأ: ";
                if (error.code === 'auth/user-not-found') msg += "المستخدم غير موجود";
                else if (error.code === 'auth/wrong-password') msg += "كلمة المرور غير صحيحة";
                else if (error.code === 'auth/invalid-email') msg += "البريد الإلكتروني غير صالح";
                else msg += error.message;
                authStatus.innerText = msg;
            }
        });

        // إنشاء حساب جديد
        signupBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const confirm = confirmPasswordInput.value.trim();
            
            if (!email || !password || !confirm) {
                authStatus.innerText = "الرجاء ملء جميع الحقول";
                return;
            }
            if (password !== confirm) {
                authStatus.innerText = "كلمتا المرور غير متطابقتين";
                return;
            }
            if (password.length < 6) {
                authStatus.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
                return;
            }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // إنشاء وثيقة المستخدم مع رصيد 0
                const userRef = doc(db, "users", userCredential.user.uid);
                await setDoc(userRef, { balance: 0, email: email });
                authStatus.innerText = "✅ تم إنشاء الحساب بنجاح! جارٍ تسجيل الدخول...";
                // سيتم تسجيل الدخول تلقائياً لأن onAuthStateChanged سيتعامل معه
            } catch (error) {
                let msg = "❌ خطأ: ";
                if (error.code === 'auth/email-already-in-use') msg += "البريد الإلكتروني مستخدم بالفعل";
                else if (error.code === 'auth/invalid-email') msg += "البريد الإلكتروني غير صالح";
                else if (error.code === 'auth/weak-password') msg += "كلمة المرور ضعيفة جداً";
                else msg += error.message;
                authStatus.innerText = msg;
            }
        });

        // تسجيل الخروج
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // زر شحن المحفظة (سيتم ربطه لاحقاً بـ Chargily Pay)
        const rechargeBtn = document.getElementById('rechargeBtn');
        rechargeBtn.addEventListener('click', () => {
            alert("🔜 سيتم تفعيل شحن المحفظة قريباً عبر Chargily Pay.\nيمكنك الآن استخدام النظام التجريبي.");
        });

        // زر دفع فاتورة (سيتم ربطه لاحقاً)
        const payBillBtn = document.getElementById('payBillBtn');
        payBillBtn.addEventListener('click', () => {
            alert("🔜 خدمة دفع الفواتير قيد التطوير.\nشكراً لصبرك.");
        });
    </script>
</body>
</html>
