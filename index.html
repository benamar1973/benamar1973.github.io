<section class="service-card">
    <h4>🌤️ توقعات الطقس للأسبوع</h4>
    <table id="weather-table">
        <tr id="weather-days">
            </tr>
        <tr id="weather-temps">
            </tr>
    </table>
    <span id="location-status" class="update-date" style="font-size: 11px; color: #777;">جاري تحديد الموقع...</span>
</section>

<section class="service-card">
    <h4>📊 أسعار صرف العملات اليوم</h4>
    <table>
        <tr>
            <th>العملة</th>
            <th>شراء</th>
            <th>بيع</th>
        </tr>
        <tr>
            <td>الأورو (€)</td>
            <td>282.00</td>
            <td>280.00</td>
        </tr>
        <tr>
            <td>الدولار ($)</td>
            <td>239.00</td>
        </tr>
    </table>
    <div style="font-size: 12px; color: #666; margin-top: 5px; text-align: center;">
        تاريخ آخر تحيين للسكوار: 27 أفريل 2026
    </div>
</section>

<section class="service-card">
    <h4>🕌 مواقيت الصلاة</h4>
    <div id="prayer-times" style="text-align: center; font-weight: bold;">
        جاري جلب المواقيت بدقة...
    </div>
</section>

<script>
    // كود جلب البيانات مع الحفاظ على الأداء
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            loadData(lat, lon);
        }, () => loadData(36.75, 3.05)); // الجزائر العاصمة كافتراضي
    } else {
        loadData(36.75, 3.05);
    }

    async function loadData(lat, lon) {
        // جلب الطقس (أسبوع)
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&timezone=Africa/Algiers`);
            const wData = await wRes.json();
            const days = ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'];
            let daysHtml = '';
            let tempsHtml = '';

            for (let i = 0; i < 7; i++) {
                const d = new Date(wData.daily.time[i]);
                daysHtml += `<td style="font-size:12px; border:1px solid #eee;">${days[d.getDay()]}</td>`;
                tempsHtml += `<td style="font-weight:bold; border:1px solid #eee;">${Math.round(wData.daily.temperature_2m_max[i])}°</td>`;
            }
            document.getElementById('weather-days').innerHTML = daysHtml;
            document.getElementById('weather-temps').innerHTML = tempsHtml;
            document.getElementById('location-status').innerText = "📍 البيانات محدثة حسب موقعك الحالي";
        } catch(e) { }

        // جلب الصلاة (دقيقة)
        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=3`);
            const pData = await pRes.json();
            const t = pData.data.timings;
            document.getElementById('prayer-times').innerHTML = `
                الفجر ${t.Fajr} | الظهر ${t.Dhuhr} | العصر ${t.Asr} | المغرب ${t.Maghrib} | العشاء ${t.Isha}
            `;
        } catch(e) { }
    }
</script>
