<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>

        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 10px solid #27ae60; }
        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 10px; }

    </style>
</head>
<body>
    <div class="card">
        <div class="status-badge">النطاق قيد التفعيل: khadamati.dz</div>

        <p>مرحباً بكم! نحن نعمل بجد لإطلاق أول بوابة رقمية شاملة تجمع كل الروابط والخدمات الإدارية التي تهم المواطن الجزائري في منصة واحدة سهلة وسريعة.</p>
        <hr style="border: 0; border-top: 1px dashed #ddd; margin: 30px 0;">
